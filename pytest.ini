[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py", "*_evals.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "eval: marks tests as evaluations (LangSmith integration tests)",
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]

# LangSmith integration
env = [
    "LANGCHAIN_TRACING_V2=true",
    "LANGCHAIN_PROJECT=mtg-agent-evals",
]

